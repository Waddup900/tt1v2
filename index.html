<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form 2 Exam Hub</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f0f2f5; --text: #2d3436; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; }
        
        /* Views */
        .view { display: none; animation: fadeIn 0.4s ease-out; }
        .active { display: block; }

        /* Typography */
        h1 { color: var(--primary); margin-top: 0; }
        .cn-sub { display: block; font-size: 0.85em; color: #636e72; font-weight: normal; margin-top: 2px; }
        
        /* Buttons */
        .btn { width: 100%; padding: 18px; margin: 10px 0; border: 2px solid #dfe6e9; border-radius: 15px; background: white; cursor: pointer; font-size: 1.1em; font-weight: 600; transition: 0.2s; text-align: center; color: var(--text); }
        .btn:hover { border-color: var(--primary); background: #f1f7ff; }
        .btn-category { background: var(--primary); color: white; border: none; }
        
        /* Quiz Specifics */
        .option-btn { text-align: left; padding: 12px 18px; }
        .option-btn.correct-glow { border-color: var(--success); background: #e8f8f0; }
        .option-btn.wrong-glow { border-color: var(--error); background: #fdf2f2; }
        
        .feedback { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; }
        .feedback.show { display: block; }
        .next-btn { background: var(--text); color: white; border: none; margin-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    
    <div id="menu-view" class="view active">
        <h1>Exam Practice <br><small style="font-size: 0.5em; color: #666;">Choose a category to start</small></h1>
        <button class="btn btn-category" onclick="startQuiz('idioms')">Idioms (成语)</button>
        <button class="btn btn-category" onclick="startQuiz('synonyms')">Synonyms (同义词)</button>
        <button class="btn btn-category" onclick="startQuiz('vocab')">Vocabulary (词汇)</button>
        <button class="btn btn-category" onclick="startQuiz('phrasal_subj')">Phrasal Verbs - Subjective</button>
        <button class="btn btn-category" onclick="startQuiz('phrasal_obj')">Phrasal Verbs - Objective</button>
        <p style="text-align: center; color: #999; font-size: 0.8em;">More categories coming soon...</p>
    </div>

    <div id="quiz-view" class="view">
        <div id="progress" style="color: var(--primary); font-weight: bold; margin-bottom: 10px;"></div>
        <div id="question-area">
            <div class="btn" style="background: #f9f9f9; cursor: default; border: none;" id="q-text"></div>
            <div id="options-list"></div>
        </div>
        
        <div id="feedback-area" class="feedback">
            <strong id="result-title"></strong>
            <p id="explanation" style="margin-top: 10px; font-style: italic;"></p>
        </div>
        
        <button id="next-btn" class="btn next-btn" style="display:none;" onclick="handleNext()">Next Question ➡️</button>
    </div>

    <div id="score-view" class="view" style="text-align: center;">
        <h2 id="final-score-text">Finished!</h2>
        <div id="score-circle" style="font-size: 3em; margin: 20px 0; color: var(--primary);"></div>
        <button class="btn btn-category" onclick="showMenu()">Try Another Category</button>
        <button class="btn" onclick="retryCategory()">Retake This Test</button>
    </div>

</div>

<script>

    const masterData = {
        
    idioms: [
        // 1. Out of sight, out of mind
        { q: "Since they moved to Australia, we rarely talk. It's truly _______.", qCn: "自从他们搬到澳洲后，我们就很少联系了。真是...", a: "out of sight, out of mind", aCn: "眼不见，心不烦/离久情疏", opts: [{t:"a rolling stone gathers no moss", c:"滚石不生苔"}, {t:"make hay while the sun shines", c:"打铁趁热"}], m: "You forget people or things when they are not around.", mCn: "当某人或某事不在身边时，很容易被遗忘。" },
        { q: "I forgot I even had those old toys in the attic. _______, I guess.", qCn: "我都忘了阁楼里还有那些旧玩具。大概是...", a: "out of sight, out of mind", aCn: "久不见则不念", opts: [{t:"one swallow does not make a summer", c:"孤燕不成夏"}, {t:"people who live in glass houses", c:"住玻璃房的人"}], m: "If you don't see it, you don't think about it.", mCn: "看不见，就不会想起。" },
        
        // 2. Make hay while the sun shines
        { q: "The mall is having a 90% discount only for today! You should _______.", qCn: "商场今天只有90%的折扣！你应该...", a: "make hay while the sun shines", aCn: "打铁趁热 / 趁机行事", opts: [{t:"out of sight, out of mind", c:"离久情疏"}, {t:"a bird in hand", c:"一鸟在手"}], m: "Take advantage of a good situation while it lasts.", mCn: "趁着机会还在，赶紧行动。" },
        { q: "You have plenty of free time before the exams start. _______ and study now!", qCn: "考试开始前你有充足的时间。你应该...", a: "make hay while the sun shines", aCn: "抓住时机", opts: [{t:"a rolling stone gathers no moss", c:"滚石不生苔"}, {t:"one swallow does not make a summer", c:"一次成功不代表全部"}], m: "Do work while conditions are favorable.", mCn: "趁条件有利时把工作做完。" },

        // 3. One swallow does not make a summer
        { q: "You won the first round, but there are ten more. Remember, _______.", qCn: "你赢了第一轮，但还有十轮。记住...", a: "one swallow does not make a summer", aCn: "孤燕不成夏 (喻：局部不代表整体)", opts: [{t:"make hay while the sun shines", c:"打铁趁热"}, {t:"out of sight, out of mind", c:"眼不见为净"}], m: "One good sign doesn't mean the whole situation is perfect.", mCn: "看到一个好迹象并不意味着大局已定。" },

        // 4. A bird in hand is worth two in the bush
        { q: "I might get a better job later, but I'll take this one. _______.", qCn: "我以后可能会找到更好的工作，但我会先接受这份。毕竟...", a: "a bird in hand is worth two in the bush", aCn: "一鸟在手胜过双鸟在林", opts: [{t:"a rolling stone gathers no moss", c:"滚石不生苔"}, {t:"people who live in glass houses", c:"责人前先想想自己"}], m: "It is better to keep what you have than to risk it for more.", mCn: "握在手里的比未到手的更有价值。" },

        // 5. People who live in glass houses shouldn't throw stones
        { q: "She is calling me messy, but her own room is a disaster! _______.", qCn: "她居然说我乱，她自己的房间才是一团糟！真是...", a: "people who live in glass houses shouldn't throw stones", aCn: "责人前先想想自己", opts: [{t:"out of sight, out of mind", c:"离久情疏"}, {t:"make hay while the sun shines", c:"打铁趁热"}], m: "Don't criticize others if you have the same faults.", mCn: "如果你也有同样的缺点，就不要批评别人。" },

        // 6. A rolling stone gathers no moss
        { q: "He changes his job every three months and never saves any money. _______.", qCn: "他每三个月换一次工作，从来存不下钱。真是...", a: "a rolling stone gathers no moss", aCn: "滚石不生苔 (喻：居无定处难成事)", opts: [{t:"a bird in hand", c:"一鸟在手"}, {t:"one swallow does not make a summer", c:"孤燕不成夏"}], m: "A person who never settles will not succeed or grow wealthy.", mCn: "频繁变动的人很难积累财富或成功。" }
    ],
    
    // PHRASAL VERBS - SUBJECTIVE CONTEXT (Life skills & Feelings)
    phrasal_subj: [
        { q: "It was a difficult year, but I managed to _______ the exams.", qCn: "这是艰难的一年，但我还是设法...了考试。", a: "get through something", aCn: "度过/完成某事", opts: [{t:"get rid of something", c:"摆脱某事"}, {t:"get ahead", c:"领先"}], m: "To finish or survive a difficult task.", mCn: "完成或熬过一项艰巨的任务。" },
        { q: "You look stressed. You should take a holiday to _______.", qCn: "你看起来压力很大。你应该去度假，...", a: "get away from it all", aCn: "远离烦恼/去度假", opts: [{t:"get into something", c:"对某事感兴趣"}, {t:"get the upper hand", c:"占上风"}], m: "To go somewhere quiet to escape stress.", mCn: "去安静的地方躲避压力。" },
        { q: "Coding is hard at first, but you will soon _______ it.", qCn: "编程起初很难，但你很快就会...它。", a: "get the hang of something", aCn: "掌握窍门", opts: [{t:"get ahead", c:"出人头地"}, {t:"get on with your life", c:"继续生活"}], m: "To learn how to do something.", mCn: "学习并掌握做某事的方法。" },
        { q: "In this competitive world, you must work hard to _______.", qCn: "在这个竞争激烈的世界里，你必须努力工作才能...", a: "get ahead", aCn: "出人头地/领先", opts: [{t:"get through something", c:"熬过去"}, {t:"get into something", c:"投入其中"}], m: "To become successful in your career.", mCn: "在事业上取得成功。" },
        { q: "After the breakup, it took him months to _______.", qCn: "分手后，他花了好几个月才...", a: "get on with your life", aCn: "继续生活/重新开始", opts: [{t:"get the upper hand", c:"占上风"}, {t:"get rid of something", c:"丢掉某物"}], m: "To move forward after a bad experience.", mCn: "在一段不愉快的经历后重新出发。" },
        { q: "I need to _______ these old magazines; they are taking up too much space.", qCn: "我需要...这些旧杂志；它们太占空间了。", a: "get rid of something", aCn: "摆脱/丢弃某物", opts: [{t:"get into something", c:"开始喜欢上"}, {t:"get through something", c:"度过"}], m: "To throw away or remove something unwanted.", mCn: "扔掉或清除不想要的东西。" },
        { q: "To _______ your gym membership, you should go every day.", qCn: "为了...你的健身会员卡，你应该每天都去。", a: "get the most out of something", aCn: "充分利用某物", opts: [{t:"get the hang of something", c:"掌握诀窍"}, {t:"get away from it all", c:"远离烦恼"}], m: "To use something in the best possible way.", mCn: "以最好的方式利用某物。" },
        { q: "I have started to _______ classical music lately.", qCn: "我最近开始...古典音乐了。", a: "get into something", aCn: "对某事产生兴趣", opts: [{t:"get ahead", c:"领先"}, {t:"get rid of something", c:"摆脱"}], m: "To become interested or involved in something.", mCn: "开始对某事感兴趣或参与其中。" },
        { q: "After a long debate, our team finally managed to _______.", qCn: "经过长时间的辩论，我们的团队终于设法...。", a: "get the upper hand", aCn: "占上风/取得优势", opts: [{t:"get away from it all", c:"度假"}, {t:"get through something", c:"熬过去"}], m: "To gain control or an advantage over someone.", mCn: "获得控制权或优势。" }
    ],

        { q: "The sun began to _______ behind the mountains.", qCn: "太阳开始在山后...。", a: "go down", aCn: "落下/下降", opts: [{t:"spill over", c:"溢出"}, {t:"stand back", c:"往后站"}], m: "To move to a lower position or set (sun).", mCn: "下移或落山。" },
        { q: "The council decided to _______ the dangerous building.", qCn: "委员会决定...那座危险的建筑物。", a: "knock down", aCn: "拆除/撞倒", opts: [{t:"turn around", c:"转变"}, {t:"feed on", c:"以...为食"}], m: "To destroy a building or structure.", mCn: "摧毁或拆除建筑物。" },
        { q: "Eagles usually _______ small animals like rabbits.", qCn: "老鹰通常...兔子之类的小动物。", a: "feed on", aCn: "以...为食", opts: [{t:"soak up", c:"吸收"}, {t:"fall apart", c:"破碎"}], m: "To eat something as a food source.", mCn: "以某物为食物来源。" },
        { q: "Use a sponge to _______ the water you spilled on the table.", qCn: "用海绵...你在桌上洒的水。", a: "soak up", aCn: "吸收/吸干", opts: [{t:"tighten up", c:"收紧"}, {t:"go down", c:"落下"}], m: "To absorb liquid.", mCn: "吸收液体。" },
        { q: "The crowd was so big that it started to _______ into the street.", qCn: "人群如此之大，以至于开始...到街道上。", a: "spill over", aCn: "溢出/扩散", opts: [{t:"stand back", c:"往后退"}, {t:"wrap up", c:"结束"}], m: "To flow over the edge of a container or space.", mCn: "溢出边缘或扩散到其他空间。" },

        { q: "The school needs to _______ the rules about latecomers.", qCn: "学校需要...关于迟到者的规定。", a: "tighten up", aCn: "加强/收紧", opts: [{t:"fall apart", c:"崩溃"}, {t:"go down", c:"下降"}], m: "To make rules or control stricter.", mCn: "使规则或控制更加严格。" },
        { q: "The new manager helped to _______ the failing company.", qCn: "新经理帮助那家倒闭的公司...了。", a: "turn around", aCn: "好转/扭转局面", opts: [{t:"feed on", c:"吃"}, {t:"soak up", c:"吸收"}], m: "To make something unsuccessful become successful.", mCn: "使失败的事物好转。" },
        { q: "Let's _______ this meeting and go for lunch.", qCn: "让我们...这次会议去吃午餐吧。", a: "wrap up", aCn: "结束/圆满完成", opts: [{t:"knock down", c:"拆除"}, {t:"spill over", c:"溢出"}], m: "To finish or complete something.", mCn: "完成或结束某事。" }
    ],

    // VOCABULARY (Standard Prep)
    vocab: [
        { q: "The morning market is always _______ with many shoppers.", qCn: "早市总是因为有很多购物者而非常...。", a: "hectic", aCn: "忙乱/繁忙", opts: [{t:"negative", c:"消极的"}, {t:"obese", c:"肥胖的"}], m: "Very busy and full of activity.", mCn: "非常繁忙且充满活动。" },
        { q: "Living near a train station is very _______ for commuters.", qCn: "住在火车站附近对通勤者来说是非常...的。", a: "convenient", aCn: "方便的", opts: [{t:"hazardous", c:"危险的"}, {t:"hectic", c:"忙乱"}], m: "Suited to your comfort or purpose.", mCn: "适合需求，方便使用。" },

        { q: "Washing your hands is part of good personal _______.", qCn: "洗手是良好个人...的一部分。", a: "hygiene", aCn: "卫生", opts: [{t:"obese", c:"肥胖"}, {t:"negative", c:"负面"}], m: "Keeping yourself clean to stay healthy.", mCn: "保持身体清洁以维持健康。" },

        { q: "You should _______ your lawyer before signing the contract.", qCn: "在签署合同之前，你应该...你的律师。", a: "consult", aCn: "咨询/商量", opts: [{t:"assist", c:"帮助"}, {t:"negative", c:"消极"}], m: "To seek advice from an expert.", mCn: "寻求专家的建议。" }

    // SYNONYMS (The "Very" Killers)
    synonyms: [

        { q: "The homeless man looked _______ in the cold rain.", qCn: "那个流浪汉在冷雨中看起来...", a: "miserable", aCn: "非常痛苦 (Very Sad)", opts: [{t:"thrilled", c:"非常兴奋"}, {t:"wealthy", c:"非常富有"}], m: "Extremely unhappy or uncomfortable.", mCn: "极度不快或不舒服。" },

        { q: "I was _______ after watching that scary movie alone.", qCn: "独自看完那部恐怖电影后，我感到...", a: "horrified", aCn: "非常恐惧 (Very Scared)", opts: [{t:"astonished", c:"非常惊讶"}, {t:"triumphant", c:"非常自豪"}], m: "Very shocked and scared.", mCn: "感到非常震惊和恐惧。" },
        { q: "The children were _______ about going to Disneyland.", qCn: "孩子们对去迪士尼乐园感到...", a: "thrilled", aCn: "非常兴奋 (Very Excited)", opts: [{t:"isolated", c:"非常孤独"}, {t:"ancient", c:"非常古老"}], m: "Extremely excited and happy.", mCn: "非常激动和愉快。" },
        { q: "The yoga room was very _______ and quiet.", qCn: "瑜伽室非常...且安静。", a: "serene", aCn: "非常宁静 (Very Calm)", opts: [{t:"irate", c:"非常愤怒"}, {t:"horrified", c:"非常恐惧"}], m: "Calm and peaceful.", mCn: "宁静且和平。" },
        { q: "He felt _______ before the results were announced.", qCn: "在成绩公布前，他感到...", a: "anxious", aCn: "非常焦虑 (Very Nervous)", opts: [{t:"devoted", c:"非常忠诚"}, {t:"pristine", c:"非常洁净"}], m: "Worried or nervous.", mCn: "担忧或紧张。" },
        { q: "The athlete stood _______ on the podium.", qCn: "运动员...地站在领奖台上。", a: "triumphant", aCn: "非常自豪 (Very Proud)", opts: [{t:"foolish", c:"非常愚蠢"}, {t:"miserable", c:"非常痛苦"}], m: "Feeling joy after a victory.", mCn: "胜利后的喜悦。" },
        { q: "The knight was _______ to his king until death.", qCn: "那位骑士直到去世都对他国王非常...。", a: "devoted", aCn: "非常忠诚 (Very Loyal)", opts: [{t:"isolated", c:"非常孤独"}, {t:"ancient", c:"非常古老"}], m: "Very loyal and loving.", mCn: "非常忠诚和热爱。" },
        { q: "The castle was _______ on top of a mountain, away from people.", qCn: "那座城堡...在山顶上，远离人群。", a: "isolated", aCn: "非常孤独/偏远 (Very Lonely)", opts: [{t:"wealthy", c:"非常富有"}, {t:"pristine", c:"非常洁净"}], m: "Separated from others.", mCn: "与世隔绝的。" },
        { q: "The pyramids are _______ monuments built thousands of years ago.", qCn: "金字塔是数千年前建造的...遗迹。", a: "ancient", aCn: "非常古老 (Very Old)", opts: [{t:"pristine", c:"非常洁净"}, {t:"foolish", c:"非常愚蠢"}], m: "Very old.", mCn: "非常古老。" },
        { q: "Her white dress remained _______ even after the party.", qCn: "即使在聚会之后，她的白色连衣裙依然...", a: "pristine", aCn: "非常洁净/崭新 (Very New)", opts: [{t:"ancient", c:"非常古老"}, {t:"horrified", c:"非常恐惧"}], m: "In its original condition; clean and fresh.", mCn: "处于原始状态；洁净如新。" },
        { q: "The _______ businessman donated millions to charity.", qCn: "那位...的企业家向慈善机构捐赠了数百万美元。", a: "wealthy", aCn: "非常富有 (Very Rich)", opts: [{t:"miserable", c:"非常痛苦"}, {t:"anxious", c:"非常焦虑"}], m: "Having a lot of money.", mCn: "非常有钱。" },
        { q: "We were _______ by how fast the little boy could run.", qCn: "我们对那个小男孩能跑多快感到...", a: "astonished", aCn: "非常惊讶 (Very Surprised)", opts: [{t:"foolish", c:"非常愚蠢"}, {t:"serene", c:"非常宁静"}], m: "Very surprised; amazed.", mCn: "非常惊讶；惊叹。" },
        { q: "It would be _______ to jump into the water without a life jacket.", qCn: "不穿救生衣跳进水里是...的行为。", a: "foolish", aCn: "非常愚蠢 (Very Stupid)", opts: [{t:"devoted", c:"非常忠诚"}, {t:"triumphant", c:"非常自豪"}], m: "Unwise or silly.", mCn: "不明智或愚蠢的。" }
    ]
};

let currentCategory = '';
let currentQuestions = [];
let currentIdx = 0;
let score = 0;

function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
}

function showMenu() { showView('menu-view'); }

function startQuiz(cat) {
    currentCategory = cat;
    // Shuffle and pick 10 (or all if less than 10)
    currentQuestions = [...masterData[cat]].sort(() => Math.random() - 0.5);
    currentIdx = 0;
    score = 0;
    showView('quiz-view');
    loadQuestion();
}

function retryCategory() { startQuiz(currentCategory); }

function loadQuestion() {
    const q = currentQuestions[currentIdx];
    document.getElementById('progress').innerText = `Question ${currentIdx + 1} / ${currentQuestions.length}`;
    document.getElementById('q-text').innerHTML = q.q;
    document.getElementById('feedback-area').classList.remove('show');
    document.getElementById('next-btn').style.display = 'none';
    
    const optionsList = document.getElementById('options-list');
    optionsList.innerHTML = '';

    // Mix the correct answer with wrong options
    const allOptions = [{t: q.a, c: q.aCn, isCorrect: true}, ...q.opts.map(o => ({t: o.t, c: o.c, isCorrect: false}))];
    allOptions.sort(() => Math.random() - 0.5);

    allOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'btn option-btn';
        btn.innerHTML = opt.t; // Start with just English
        btn.onclick = () => selectOption(btn, opt.isCorrect, q);
        optionsList.appendChild(btn);
    });
}

function selectOption(clickedBtn, isCorrect, qData) {
    if (document.getElementById('next-btn').style.display === 'block') return; // Prevent double clicking

    if (isCorrect) {
        score++;
        clickedBtn.classList.add('correct-glow');
        document.getElementById('result-title').innerHTML = "✅ Correct! <span class='cn-sub'>正确！</span>";
    } else {
        clickedBtn.classList.add('wrong-glow');
        document.getElementById('result-title').innerHTML = "❌ Wrong! <span class='cn-sub'>错误！</span>";
    }

    // SHOW TRANSLATIONS FOR EVERYTHING
    document.getElementById('q-text').innerHTML = `${qData.q}<br><span class="cn-sub">${qData.qCn}</span>`;
    
    // Transform all option buttons to show Chinese
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => {
        // Find the matching translation in our data
        let translation = "";
        if (b.innerText === qData.a) translation = qData.aCn;
        else {
            const found = qData.opts.find(o => o.t === b.innerText);
            translation = found ? found.c : "";
        }
        b.innerHTML = `${b.innerText}<br><span class="cn-sub">${translation}</span>`;
        if (b.innerText.includes(qData.a)) b.classList.add('correct-glow'); // Highlight the right one anyway
    });

    document.getElementById('explanation').innerHTML = `Meaning: ${qData.m}<br><span class="cn-sub">${qData.mCn}</span>`;
    document.getElementById('feedback-area').classList.add('show');
    document.getElementById('next-btn').style.display = 'block';
}

function handleNext() {
    currentIdx++;
    if (currentIdx < currentQuestions.length) {
        loadQuestion();
    } else {
        showScore();
    }
}

function showScore() {
    showView('score-view');
    const percent = Math.round((score / currentQuestions.length) * 100);
    document.getElementById('score-circle').innerText = `${score} / ${currentQuestions.length}`;
    document.getElementById('final-score-text').innerText = percent >= 70 ? "Excellent! 你真棒! 🎉" : "Keep Trying! 再接再厉! 💪";
}
</script>
