<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form 2 Exam Hub</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f0f2f5; --text: #2d3436; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; }
        
        /* Views */
        .view { display: none; animation: fadeIn 0.4s ease-out; }
        .active { display: block; }

        /* Typography */
        h1 { color: var(--primary); margin-top: 0; }
        .cn-sub { display: block; font-size: 0.85em; color: #636e72; font-weight: normal; margin-top: 2px; }
        
        /* Buttons */
        .btn { width: 100%; padding: 18px; margin: 10px 0; border: 2px solid #dfe6e9; border-radius: 15px; background: white; cursor: pointer; font-size: 1.1em; font-weight: 600; transition: 0.2s; text-align: center; color: var(--text); }
        .btn:hover { border-color: var(--primary); background: #f1f7ff; }
        .btn-category { background: var(--primary); color: white; border: none; }
        
        /* Quiz Specifics */
        .option-btn { text-align: left; padding: 12px 18px; }
        .option-btn.correct-glow { border-color: var(--success); background: #e8f8f0; }
        .option-btn.wrong-glow { border-color: var(--error); background: #fdf2f2; }
        
        .feedback { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; }
        .feedback.show { display: block; }
        .next-btn { background: var(--text); color: white; border: none; margin-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    
    <div id="menu-view" class="view active">
        <h1>Exam Practice <br><small style="font-size: 0.5em; color: #666;">Choose a category to start</small></h1>
        <button class="btn btn-category" onclick="startQuiz('idioms')">Idioms (成语)</button>
        <button class="btn btn-category" onclick="startQuiz('synonyms')">Synonyms (同义词)</button>
        <button class="btn btn-category" onclick="startQuiz('vocab')">Vocabulary (词汇)</button>
        <button class="btn btn-category" onclick="startQuiz('phrasal_subj')">Phrasal Verbs - Subjective</button>
        <button class="btn btn-category" onclick="startQuiz('phrasal_obj')">Phrasal Verbs - Objective</button>
        <button class="btn btn-category" onclick="startQuiz('prepositions')">Prepositions (连词)</button>
        <button class="btn btn-category" onclick="startQuiz('compound_adj')">Compound Adjectives (有 - 的）</button>
        <p style="text-align: center; color: #999; font-size: 0.8em;">More categories coming soon...</p>
    </div>

    <div id="quiz-view" class="view">
        <div id="progress" style="color: var(--primary); font-weight: bold; margin-bottom: 10px;"></div>
        <div id="question-area">
            <div class="btn" style="background: #f9f9f9; cursor: default; border: none;" id="q-text"></div>
            <div id="options-list"></div>
        </div>
        
        <div id="feedback-area" class="feedback">
            <strong id="result-title"></strong>
            <p id="explanation" style="margin-top: 10px; font-style: italic;"></p>
        </div>
        
        <button id="next-btn" class="btn next-btn" style="display:none;" onclick="handleNext()">Next Question ➡️</button>
    </div>

    <div id="score-view" class="view" style="text-align: center;">
        <h2 id="final-score-text">Finished!</h2>
        <div id="score-circle" style="font-size: 3em; margin: 20px 0; color: var(--primary);"></div>
        <button class="btn btn-category" onclick="showMenu()">Try Another Category</button>
        <button class="btn" onclick="retryCategory()">Retake This Test</button>
    </div>

</div>

<script>

    const masterData = {
        
    idioms: [
        // 1. Out of sight, out of mind
        { q: "Since they moved to Australia, we rarely talk. It's truly _______.", qCn: "自从他们搬到澳洲后，我们就很少联系了。真是...", a: "out of sight, out of mind", aCn: "眼不见，心不烦/离久情疏", opts: [{t:"a rolling stone gathers no moss", c:"滚石不生苔"}, {t:"make hay while the sun shines", c:"打铁趁热"}], m: "You forget people or things when they are not around.", mCn: "当某人或某事不在身边时，很容易被遗忘。" },
        { q: "I forgot I even had those old toys in the attic. _______, I guess.", qCn: "我都忘了阁楼里还有那些旧玩具。大概是...", a: "out of sight, out of mind", aCn: "久不见则不念", opts: [{t:"one swallow does not make a summer", c:"孤燕不成夏"}, {t:"people who live in glass houses", c:"住玻璃房的人"}], m: "If you don't see it, you don't think about it.", mCn: "看不见，就不会想起。" },
        
        // 2. Make hay while the sun shines
        { q: "The mall is having a 90% discount only for today! You should _______.", qCn: "商场今天只有90%的折扣！你应该...", a: "make hay while the sun shines", aCn: "打铁趁热 / 趁机行事", opts: [{t:"out of sight, out of mind", c:"离久情疏"}, {t:"a bird in hand", c:"一鸟在手"}], m: "Take advantage of a good situation while it lasts.", mCn: "趁着机会还在，赶紧行动。" },
        { q: "You have plenty of free time before the exams start. _______ and study now!", qCn: "考试开始前你有充足的时间。你应该...", a: "make hay while the sun shines", aCn: "抓住时机", opts: [{t:"a rolling stone gathers no moss", c:"滚石不生苔"}, {t:"one swallow does not make a summer", c:"一次成功不代表全部"}], m: "Do work while conditions are favorable.", mCn: "趁条件有利时把工作做完。" },

        // 3. One swallow does not make a summer
        { q: "You won the first round, but there are ten more. Remember, _______.", qCn: "你赢了第一轮，但还有十轮。记住...", a: "one swallow does not make a summer", aCn: "孤燕不成夏 (喻：局部不代表整体)", opts: [{t:"make hay while the sun shines", c:"打铁趁热"}, {t:"out of sight, out of mind", c:"眼不见为净"}], m: "One good sign doesn't mean the whole situation is perfect.", mCn: "看到一个好迹象并不意味着大局已定。" },

        // 4. A bird in hand is worth two in the bush
        { q: "I might get a better job later, but I'll take this one. _______.", qCn: "我以后可能会找到更好的工作，但我会先接受这份。毕竟...", a: "a bird in hand is worth two in the bush", aCn: "一鸟在手胜过双鸟在林", opts: [{t:"a rolling stone gathers no moss", c:"滚石不生苔"}, {t:"people who live in glass houses", c:"责人前先想想自己"}], m: "It is better to keep what you have than to risk it for more.", mCn: "握在手里的比未到手的更有价值。" },

        // 5. People who live in glass houses shouldn't throw stones
        { q: "She is calling me messy, but her own room is a disaster! _______.", qCn: "她居然说我乱，她自己的房间才是一团糟！真是...", a: "people who live in glass houses shouldn't throw stones", aCn: "责人前先想想自己", opts: [{t:"out of sight, out of mind", c:"离久情疏"}, {t:"make hay while the sun shines", c:"打铁趁热"}], m: "Don't criticize others if you have the same faults.", mCn: "如果你也有同样的缺点，就不要批评别人。" },

        // 6. A rolling stone gathers no moss
        { q: "He changes his job every three months and never saves any money. _______.", qCn: "他每三个月换一次工作，从来存不下钱。真是...", a: "a rolling stone gathers no moss", aCn: "滚石不生苔 (喻：居无定处难成事)", opts: [{t:"a bird in hand", c:"一鸟在手"}, {t:"one swallow does not make a summer", c:"孤燕不成夏"}], m: "A person who never settles will not succeed or grow wealthy.", mCn: "频繁变动的人很难积累财富或成功。" }
    ],

    // PREPOSITIONS (Time & Place) - 30 Questions
    // Rule: AT (Specific point/time), ON (Days/Dates/Surfaces), IN (Enclosed space/Long periods)
    prepositions: [
        // AT (Time & Place)
        { q: "The movie starts _______ 8:30 PM sharp.", qCn: "电影在晚上 8:30 准时开始。", a: "at", aCn: "在（具体时间点）", opts: [{t:"in", c:"在...之内"}, {t:"on", c:"在...之上"}], m: "Use 'at' for specific clock times.", mCn: "用于具体的时刻。" },
        { q: "I will meet you _______ the main entrance of the mall.", qCn: "我会在商场正门口见你。", a: "at", aCn: "在（具体地点）", opts: [{t:"on", c:"在...上面"}, {t:"in", c:"在...里面"}], m: "Use 'at' for a specific point or address.", mCn: "用于具体的地点或坐标。" },
        { q: "He usually goes for a run _______ dawn.", qCn: "他通常在黎明时分去跑步。", a: "at", aCn: "在（特定时刻）", opts: [{t:"on", c:"在...那天"}, {t:"in", c:"在...期间"}], m: "Use 'at' for specific points in the day (noon, midnight, dawn).", mCn: "用于一天中特定的时刻。" },
        { q: "I am currently _______ work, so I can't talk right now.", qCn: "我目前在上班，所以现在不能说话。", a: "at", aCn: "在（活动中/地点）", opts: [{t:"in", c:"在...内"}, {t:"on", c:"在...上"}], m: "Use 'at' for functional buildings or activities (work, school, home).", mCn: "用于功能性地点或正在进行的活动。" },
        { q: "Let's discuss this _______ lunchtime.", qCn: "让我们在午饭时间讨论这件事。", a: "at", aCn: "在（用餐时间）", opts: [{t:"in", c:"在...里"}, {t:"on", c:"在...上"}], m: "Use 'at' for mealtimes.", mCn: "用于用餐时间。" },
        // ... (Adding more variations for AT)
        { q: "The bus stop is right _______ the corner of the street.", qCn: "公车站就在街道转角处。", a: "at", aCn: "在...处", opts: [{t:"in", c:"在...里"}, {t:"on", c:"在...上"}], m: "Specific point.", mCn: "具体位置。" },
        { q: "I wasn't happy _______ first, but now I like it.", qCn: "起初我不开心，但现在我喜欢它了。", a: "at", aCn: "在（最初）", opts: [{t:"in", c:"在..."}, {t:"on", c:"在..."}], m: "Fixed expression: At first.", mCn: "固定搭配：起初。" },
        { q: "We had a party _______ Christmas.", qCn: "我们在圣诞节期间办了个派对。", a: "at", aCn: "在（节日期间）", opts: [{t:"on", c:"在某一天"}, {t:"in", c:"在...内"}], m: "Use 'at' for holiday periods (at Christmas, at Easter).", mCn: "用于整个节日期间（若指某一天则用on）。" },
        { q: "He is sitting _______ the desk doing his homework.", qCn: "他正坐在书桌前做功课。", a: "at", aCn: "在（书桌）旁", opts: [{t:"in", c:"在...里"}, {t:"on", c:"在...上"}], m: "Using 'at' for sitting by a furniture item.", mCn: "坐在家具旁（强调功能）。" },
        { q: "The water boils _______ 100 degrees Celsius.", qCn: "水在摄氏 100 度沸腾。", a: "at", aCn: "在（具体数值）", opts: [{t:"in", c:"在..."}, {t:"on", c:"在..."}], m: "Use 'at' for specific degrees or speeds.", mCn: "用于具体的温度、速度或数值。" },

        // ON (Days/Dates/Surfaces)
        { q: "My birthday is _______ the 15th of May.", qCn: "我的生日在 5 月 15 日。", a: "on", aCn: "在（具体日期）", opts: [{t:"at", c:"在...点"}, {t:"in", c:"在...月"}], m: "Use 'on' for specific dates.", mCn: "用于具体的日期。" },
        { q: "We have English class _______ Mondays.", qCn: "我们每周一有英语课。", a: "on", aCn: "在（星期几）", opts: [{t:"at", c:"在..."}, {t:"in", c:"在..."}], m: "Use 'on' for days of the week.", mCn: "用于星期几。" },
        { q: "The cat is sleeping _______ the sofa.", qCn: "猫在沙发上睡觉。", a: "on", aCn: "在...上面（表面）", opts: [{t:"in", c:"在...里面"}, {t:"at", c:"在...处"}], m: "Use 'on' for surfaces.", mCn: "用于物体的表面。" },
        { q: "I will see you _______ New Year's Day.", qCn: "我会在元旦那天见你。", a: "on", aCn: "在（特定的一天）", opts: [{t:"at", c:"在...期间"}, {t:"in", c:"在...年"}], m: "Use 'on' for one specific day.", mCn: "用于特定的一天。" },
        { q: "I left my keys _______ the kitchen table.", qCn: "我把钥匙留在厨房桌子上了。", a: "on", aCn: "在...上（表面）", opts: [{t:"in", c:"在...里"}, {t:"at", c:"在...旁"}], m: "Surface contact.", mCn: "接触表面。" },
        { q: "There is a fly _______ the ceiling.", qCn: "天花板上有一只苍蝇。", a: "on", aCn: "在...上", opts: [{t:"in", c:"在...里"}, {t:"at", c:"在...处"}], m: "Surfaces include walls and ceilings.", mCn: "表面也包括墙壁和天花板。" },
        { q: "I like to listen to music _______ the radio.", qCn: "我喜欢听收音机里的音乐。", a: "on", aCn: "通过（电子媒体）", opts: [{t:"in", c:"在...里"}, {t:"at", c:"在...处"}], m: "Use 'on' for media like TV, radio, internet.", mCn: "用于电视、广播、网络等媒体。" },
        { q: "He lives _______ the third floor.", qCn: "他住在三楼。", a: "on", aCn: "在（第几层）", opts: [{t:"in", c:"在...内"}, {t:"at", c:"在...处"}], m: "Use 'on' for floor levels.", mCn: "用于楼层。" },
        { q: "I am _______ the bus right now.", qCn: "我正坐在巴士上。", a: "on", aCn: "在（大型交通工具）上", opts: [{t:"in", c:"在（轿车）内"}, {t:"at", c:"在...处"}], m: "Use 'on' for public transport (bus, train, plane).", mCn: "用于公共交通工具（通常指可以站立走动的）。" },
        { q: "The shop is _______ your left.", qCn: "商店在你的左手边。", a: "on", aCn: "在（方位）", opts: [{t:"in", c:"在...内"}, {t:"at", c:"在...处"}], m: "Use 'on' for left/right directions.", mCn: "用于左右方向。" },

        // IN (Periods/Enclosed Spaces)
        { q: "The keys are _______ the drawer.", qCn: "钥匙在抽屉里。", a: "in", aCn: "在...里面", opts: [{t:"on", c:"在...上面"}, {t:"at", c:"在...处"}], m: "Use 'in' for enclosed spaces.", mCn: "用于封闭的空间。" },
        { q: "It's beautiful here _______ the spring.", qCn: "这里的春天很美。", a: "in", aCn: "在（季节）", opts: [{t:"on", c:"在...那天"}, {t:"at", c:"在...点"}], m: "Use 'in' for seasons, months, and years.", mCn: "用于季节、月份和年份。" },
        { q: "He was born _______ 1995.", qCn: "他出生于 1995 年。", a: "in", aCn: "在（年份）", opts: [{t:"on", c:"在...天"}, {t:"at", c:"在...点"}], m: "Use 'in' for years.", mCn: "用于年份。" },
        { q: "There are millions of stars _______ the sky.", qCn: "天空中有数百万颗星星。", a: "in", aCn: "在...（空间）", opts: [{t:"on", c:"在...上"}, {t:"at", c:"在...点"}], m: "Use 'in' for three-dimensional spaces.", mCn: "用于三维空间。" },
        { q: "I read about it _______ a newspaper.", qCn: "我在报纸上读到了这件事。", a: "in", aCn: "在（纸质媒体）中", opts: [{t:"on", c:"在...上"}, {t:"at", c:"在...处"}], m: "Use 'in' for print media.", mCn: "用于纸质媒体。" },
        { q: "He is currently _______ prison for his crimes.", qCn: "他目前因罪入狱。", a: "in", aCn: "在（机构）里", opts: [{t:"at", c:"在...处"}, {t:"on", c:"在...上"}], m: "Use 'in' when inside an institution.", mCn: "在机构内部。" },
        { q: "I will finish the work _______ ten minutes.", qCn: "我会在十分钟内完成工作。", a: "in", aCn: "在...（时间）之后/之内", opts: [{t:"at", c:"在...点"}, {t:"on", c:"在...天"}], m: "Use 'in' to mean 'after a period of time'.", mCn: "表示在一段时间之后或之内。" },
        { q: "He grew up _______ a small village.", qCn: "他在一个小村庄长大。", a: "in", aCn: "在（地区/城市）", opts: [{t:"at", c:"在...点"}, {t:"on", c:"在...上"}], m: "Use 'in' for cities, countries, and villages.", mCn: "用于城市、国家、村庄等区域。" },
        { q: "She is _______ the pool swimming.", qCn: "她在泳池里游泳。", a: "in", aCn: "在...（液体/空间）里", opts: [{t:"on", c:"在...表面"}, {t:"at", c:"在...处"}], m: "Inside a volume of water.", mCn: "在水体中。" },
        { q: "The kids are playing _______ the garden.", qCn: "孩子们在花园里玩耍。", a: "in", aCn: "在（有围栏的区域）里", opts: [{t:"at", c:"在...点"}, {t:"on", c:"在...表面"}], m: "In an area with boundaries.", mCn: "在有界限的区域内。" }
    ],

    // COMPOUND ADJECTIVES - 64 Questions (2 variations for each of the 32 terms)
    compound_adj: [
        // Number + Singular Noun
        { q: "I only have a _______ break for lunch.", qCn: "我只有五分钟的午休时间。", a: "five-minute", aCn: "五分钟的", opts: [{t:"five-minutes", c:"(错误形式)"}, {t:"fifth-minute", c:"第五分钟"}], m: "Use singular noun in compound adjectives.", mCn: "复合形容词中的名词须用单数。" },
        { q: "It was a _______ wait at the hospital.", qCn: "在医院里等了三个小时。", a: "three-hour", aCn: "三小时的", opts: [{t:"three-hours", c:"(错误形式)"}, {t:"third-hour", c:"第三小时"}], m: "Hyphenated number + singular noun.", mCn: "数词+单数名词，中间加连字符。" },

        // Adjective + Noun
        { q: "The pilot made a _______ decision to land the plane safely.", qCn: "飞行员做出了最后一刻的决定，安全降落了飞机。", a: "last-minute", aCn: "最后一刻的", opts: [{t:"first-minute", c:"第一分钟的"}, {t:"long-term", c:"长期的"}], m: "Decision made at the very end.", mCn: "在最后关头做出的。" },
        { q: "The athlete ran a _______ race to win the gold medal.", qCn: "运动员参加了长距离比赛并获得了金牌。", a: "long-distance", aCn: "长距离的", opts: [{t:"short-term", c:"短期的"}, {t:"high-quality", c:"高品质的"}], m: "Covering a large gap in space.", mCn: "跨越较大空间的。" },
        { q: "This is a _______ documentary about the life of lions.", qCn: "这是一部关于狮子生活的完整长度纪录片。", a: "full-length", aCn: "完整长度的", opts: [{t:"short-term", c:"短期的"}, {t:"last-minute", c:"最后一刻的"}], m: "The complete version, not edited down.", mCn: "未经剪辑的完整版本。" },
        { q: "We need a _______ solution to this small problem.", qCn: "我们需要一个针对这个小问题的短期解决方案。", a: "short-term", aCn: "短期的", opts: [{t:"long-distance", c:"长距离的"}, {t:"high-quality", c:"高品质的"}], m: "Lasting for a small amount of time.", mCn: "持续时间较短的。" },
        { q: "The brand is known for its _______ leather products.", qCn: "该品牌以其高品质的皮革制品而闻名。", a: "high-quality", aCn: "高品质的", opts: [{t:"low-quality", c:"低品质的"}, {t:"last-minute", c:"最后一刻的"}], m: "Very good or excellent standard.", mCn: "非常优秀或卓越的标准。" },

        // Adjective + Present Participle (-ing)
        { q: "Everyone likes him because he is very _______.", qCn: "大家都喜欢他，因为他很随和。", a: "easy-going", aCn: "随和的", opts: [{t:"quick-thinking", c:"反应敏捷的"}, {t:"good-looking", c:"好看的"}], m: "Relaxed and not easily upset.", mCn: "性格随和，不易烦躁。" },
        { q: "The actor is famous for being very _______.", qCn: "这位演员以长相英俊而闻名。", a: "good-looking", aCn: "好看的/帅气的", opts: [{t:"tight-fitting", c:"紧身的"}, {t:"record-breaking", c:"破纪录的"}], m: "Physically attractive.", mCn: "外表有吸引力的。" },
        { q: "It was a _______ performance that stunned the judges.", qCn: "这是一场令评委震惊的破纪录演出。", a: "record-breaking", aCn: "破纪录的", opts: [{t:"easy-going", c:"随和的"}, {t:"quick-thinking", c:"反应敏捷的"}], m: "Surpassing any previous achievement.", mCn: "超越以往任何成就的。" },
        { q: "The superhero's _______ saved the city from the bomb.", qCn: "超级英雄的敏捷反应从炸弹中解救了城市。", a: "quick-thinking", aCn: "反应敏捷的", opts: [{t:"tight-fitting", c:"紧身的"}, {t:"good-looking", c:"英俊的"}], m: "Acting or deciding quickly.", mCn: "能快速行动或做出决定。" },

        { q: "The _______ businessman donated millions to charity.", qCn: "那位...的企业家向慈善机构捐赠了数百万美元。", a: "wealthy", aCn: "非常富有 (Very Rich)", opts: [{t:"miserable", c:"非常痛苦"}, {t:"anxious", c:"非常焦虑"}], m: "Having a lot of money.", mCn: "非常有钱。" },
        { q: "We were _______ by how fast the little boy could run.", qCn: "我们对那个小男孩能跑多快感到...", a: "astonished", aCn: "非常惊讶 (Very Surprised)", opts: [{t:"foolish", c:"非常愚蠢"}, {t:"serene", c:"非常宁静"}], m: "Very surprised; amazed.", mCn: "非常惊讶；惊叹。" },
        { q: "It would be _______ to jump into the water without a life jacket.", qCn: "不穿救生衣跳进水里是...的行为。", a: "foolish", aCn: "非常愚蠢 (Very Stupid)", opts: [{t:"devoted", c:"非常忠诚"}, {t:"triumphant", c:"非常自豪"}], m: "Unwise or silly.", mCn: "不明智或愚蠢的。" }
    ]
};

let currentCategory = '';
let currentQuestions = [];
let currentIdx = 0;
let score = 0;

function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
}

function showMenu() { showView('menu-view'); }

function startQuiz(cat) {
    currentCategory = cat;
    const data = masterData[cat];
    
    // 1. Group questions by their correct answer 'a'
    const grouped = data.reduce((acc, q) => {
        if (!acc[q.a]) acc[q.a] = [];
        acc[q.a].push(q);
        return acc;
    }, {});

    // 2. Get the unique answer keys and shuffle them
    const uniqueKeys = Object.keys(grouped).sort(() => Math.random() - 0.5);
    
    // 3. Pick 10 unique keys (or all if less than 10)
    const selectedKeys = uniqueKeys.slice(0, 10);
    
    // 4. From each selected key, pick ONE random variation
    currentQuestions = selectedKeys.map(key => {
        const variations = grouped[key];
        return variations[Math.floor(Math.random() * variations.length)];
    });

    // 5. Final shuffle so the order of words is random too
    currentQuestions.sort(() => Math.random() - 0.5);

    currentIdx = 0;
    score = 0;
    showView('quiz-view');
    loadQuestion();
}

function retryCategory() { startQuiz(currentCategory); }

function loadQuestion() {
    const q = currentQuestions[currentIdx];
    document.getElementById('progress').innerText = `Question ${currentIdx + 1} / ${currentQuestions.length}`;
    document.getElementById('q-text').innerHTML = q.q;
    document.getElementById('feedback-area').classList.remove('show');
    document.getElementById('next-btn').style.display = 'none';
    
    const optionsList = document.getElementById('options-list');
    optionsList.innerHTML = '';

    // Mix the correct answer with wrong options
    const allOptions = [{t: q.a, c: q.aCn, isCorrect: true}, ...q.opts.map(o => ({t: o.t, c: o.c, isCorrect: false}))];
    allOptions.sort(() => Math.random() - 0.5);

    allOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'btn option-btn';
        btn.innerHTML = opt.t; // Start with just English
        btn.onclick = () => selectOption(btn, opt.isCorrect, q);
        optionsList.appendChild(btn);
    });
}

function selectOption(clickedBtn, isCorrect, qData) {
    if (document.getElementById('next-btn').style.display === 'block') return; // Prevent double clicking

    if (isCorrect) {
        score++;
        clickedBtn.classList.add('correct-glow');
        document.getElementById('result-title').innerHTML = "✅ Correct! <span class='cn-sub'>正确！</span>";
    } else {
        clickedBtn.classList.add('wrong-glow');
        document.getElementById('result-title').innerHTML = "❌ Wrong! <span class='cn-sub'>错误！</span>";
    }

    // SHOW TRANSLATIONS FOR EVERYTHING
    document.getElementById('q-text').innerHTML = `${qData.q}<br><span class="cn-sub">${qData.qCn}</span>`;
    
    // Transform all option buttons to show Chinese
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => {
        // Find the matching translation in our data
        let translation = "";
        if (b.innerText === qData.a) translation = qData.aCn;
        else {
            const found = qData.opts.find(o => o.t === b.innerText);
            translation = found ? found.c : "";
        }
        b.innerHTML = `${b.innerText}<br><span class="cn-sub">${translation}</span>`;
        if (b.innerText.includes(qData.a)) b.classList.add('correct-glow'); // Highlight the right one anyway
    });

    document.getElementById('explanation').innerHTML = `Meaning: ${qData.m}<br><span class="cn-sub">${qData.mCn}</span>`;
    document.getElementById('feedback-area').classList.add('show');
    document.getElementById('next-btn').style.display = 'block';
}

function handleNext() {
    currentIdx++;
    if (currentIdx < currentQuestions.length) {
        loadQuestion();
    } else {
        showScore();
    }
}

function showScore() {
    showView('score-view');
    const percent = Math.round((score / currentQuestions.length) * 100);
    document.getElementById('score-circle').innerText = `${score} / ${currentQuestions.length}`;
    document.getElementById('final-score-text').innerText = percent >= 70 ? "Excellent! 你真棒! 🎉" : "Keep Trying! 再接再厉! 💪";
}
</script>
